# ---------------------------------------------------------------------------
# Publish scheduled posts
#
# Runs every 15 minutes and on demand. Calls publish-due.mjs, which moves
# any scheduled post whose time has arrived into posts.json and marks it
# "published" in schedule.json. The commit only happens when something
# actually changed; the "|| echo" guard prevents a false-failure when
# nothing was due.
# ---------------------------------------------------------------------------

name: Publish scheduled posts

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  publish-due:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Publish any due scheduled posts
        run: node scripts/publish-due.mjs

      - name: Commit and push
        run: |
          git config user.name "ProfitPulse Bot"
          git config user.email "bot@users.noreply.github.com"
          git add posts.json docs/data/schedule.json
          git commit -m "Auto-publish scheduled posts" || echo "nothing due"
          git push || echo "nothing to push"
