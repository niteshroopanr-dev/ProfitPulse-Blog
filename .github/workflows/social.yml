# ---------------------------------------------------------------------------
# Social posts on publish
#
# Runs automatically a moment after you press Publish in the app. Publishing
# commits your final post to posts.json, and this workflow notices that change,
# reads the freshly published post, and drafts your LinkedIn, Facebook and
# Google posts from the final text. The app then displays them.
#
# It only triggers on changes to posts.json, so the 3am draft job (which writes
# to drafts/ and docs/data/) never sets it off. It commits only the social file,
# so it never re-triggers itself.
# ---------------------------------------------------------------------------

name: Social posts on publish

on:
  push:
    branches: [main]
    paths:
      - "posts.json"     # only when a post is actually published or revised
  workflow_dispatch:
    inputs:
      title:
        description: "Title of the post to write social drafts for (leave blank to use latest in posts.json)"
        required: false
        type: string
      date:
        description: "Date of the post YYYY-MM-DD (used to disambiguate when title alone is not unique)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  social:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Draft social posts from the latest published post
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          SOCIAL_TITLE: ${{ github.event.inputs.title }}
          SOCIAL_DATE: ${{ github.event.inputs.date }}
        run: |
          npm install -g @anthropic-ai/claude-code
          claude -p "$(cat scripts/generate-social.md)" --dangerously-skip-permissions

      - name: Commit the social drafts
        run: |
          git config user.name "ProfitPulse Bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/data/social-latest.json
          git commit -m "Social drafts for latest post" || echo "Nothing to commit"
          git push
